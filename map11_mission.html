<!DOCTYPE html>
<html>
<head>
<title>Moon Map - Mission 11</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body{margin:0;background:black;}
#map{width:100%;height:100vh;}

.map-label{
background:#111;
color:#fff;
padding:6px 8px;
font-size:11px;
border-radius:4px;
font-family:monospace;
border:1px solid #444;
}

.no-icon{
background:transparent!important;
border:none!important;
}

.leaflet-tooltip:before{display:none;}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const W=8192,H=4096;

const CRS=L.extend({},L.CRS.Simple,{
transformation:new L.Transformation(1,0,-1,H)
});

const map=L.map("map",{crs:CRS,minZoom:-2,maxZoom:4});

// ✅ stitched maps restored
L.imageOverlay("moon.jpg",[[0,0],[H,W]]).addTo(map);
L.imageOverlay("moon.jpg",[[0,W],[H,2*W]]).addTo(map);
L.imageOverlay("moon.jpg",[[0,-W],[H,0]]).addTo(map);

// GEO
function geo(lat,lon){
const x=(lon+180)/360*W;
const y=(90-lat)/180*H;
return L.latLng(H-y,x+W);
}

// ✅ FIX straight line
function normalizeLon(prev,lon){
if(prev===null)return lon;
let diff=lon-prev;
if(diff>180)lon-=360;
else if(diff<-180)lon+=360;
return lon;
}

// ICON
function roverIcon(){
return L.divIcon({
html:`<svg width="28"><rect x="6" y="12" width="20" height="6" fill="#ff4444"/>
<circle cx="10" cy="22" r="3" fill="#ff4444"/>
<circle cx="22" cy="22" r="3" fill="#ff4444"/></svg>`,
iconAnchor:[14,26],
className:"no-icon"
});
}

// LOAD
const files=["data/rout3leg04.kml","data/rout3leg05.kml"];

let pts=[],lastLon=null;

Promise.all(files.map(f=>fetch(f).then(r=>r.text())))
.then(results=>{

results.forEach(text=>{
const xml=new DOMParser().parseFromString(text,"text/xml");

xml.querySelectorAll("coordinates").forEach(n=>{
n.textContent.trim().split(/\s+/).forEach(p=>{
let [lon,lat]=p.split(",");
lon=parseFloat(lon);
lat=parseFloat(lat);

lon=normalizeLon(lastLon,lon);
lastLon=lon;

pts.push(geo(lat,lon));
});
});
});

const line=L.polyline(pts,{color:"#ff4444",weight:3}).addTo(map);

map.fitBounds(line.getBounds().pad(0.3));

setTimeout(()=>{
let z=map.getZoom();
map.setMinZoom(z);
map.setMaxZoom(z);
map.dragging.disable();
},200);

// ✅ FULL LOG RESTORED
L.marker(pts[0],{opacity:0}).addTo(map)
.bindTooltip(
"CROOKS CRATER<br>Distance: 1000 km<br>UTC: 08/01/2032 06:45<br>MLLST: 13:55 RLLST: 10:30",
{permanent:true,offset:[120,-40],className:"map-label"}
);

L.marker(pts[pts.length-1],{icon:roverIcon()}).addTo(map)
.bindTooltip(
"PAVLOV CRATER<br>Speed: 8 km/h<br>UTC: 08/06/2032 11:33<br>MLLST: 18:07 RLLST: 11:30",
{permanent:true,offset:[-140,-40],className:"map-label"}
);

});

</script>
</body>
</html>
