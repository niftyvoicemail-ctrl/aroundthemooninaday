<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background:#000; color:#fff; font-family:monospace; text-align:center; padding-top:60px; margin:0; }
  .label { color:#555; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px; }
  h2 { color:#eee; font-size:1rem; font-weight:normal; margin-bottom:4px; }
  .author { color:#444; font-size:.7rem; margin-bottom:32px; }
  .prices { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
  .prices a {
    padding:12px 20px; border:1px solid #333; color:#eee;
    text-decoration:none; font-size:.95rem;
    transition:border-color .15s;
  }
  .prices a:hover { border-color:#888; }
  .note { color:#333; font-size:.65rem; line-height:1.6; margin-bottom:40px; }
  .divider { border:none; border-top:1px solid #1a1a1a; width:60%; margin:0 auto 32px; }
  .retailers { display:flex; flex-direction:column; gap:10px; align-items:center; margin-bottom:20px; }
  .retailers a {
    padding:10px 24px; border:1px solid #2a2a2a; color:#aaa;
    text-decoration:none; font-size:.8rem; letter-spacing:.08em;
    width:220px;
    transition:border-color .15s, color .15s;
  }
  .retailers a:hover { border-color:#666; color:#eee; }
</style>
</head>
<body>
  <h2>Around the Moon in a Day</h2>
  <div class="author">Michael Jayne</div>

</body>
</html>
