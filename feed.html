<!DOCTYPE html>
<html>
<head>
<title>Live Feed</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #0c0e14;
  color: #a8c0d8;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
}
#container { padding: 10px 12px; }
h3 {
  color: #4a9eff;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
  border-bottom: 1px solid #1e2836;
  padding-bottom: 6px;
}
.post {
  border-bottom: 1px solid #1a2030;
  padding: 8px 4px;
}
.post-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}
.user { color: #5ab0ff; font-size: 11px; }
.user.ops    { color: #5ab0ff; }
.user.field  { color: #5abf8a; }
.user.noise  { color: #a070d0; }
.user.critic { color: #d08040; }
.user.anon   { color: #607080; }
.time { color: #384858; font-size: 10px; }
.post-text { color: #9ab8cc; line-height: 1.5; }
.reply {
  margin-left: 18px;
  padding: 5px 0 3px;
  border-left: 2px solid #1e2836;
  padding-left: 10px;
  margin-top: 4px;
}
.reply .post-text { color: #7090a8; }
</style>
</head>
<body>
<div id="container">
<h3>▤ Mission Feed</h3>
<div id="feed"></div>
</div>

<script>

const params  = new URLSearchParams(window.location.search);
const chapter = Number(params.get('chapter')) || 1;

// ============================================================
//  DATE SYSTEM — fixed UTC dates per chapter band
// ============================================================
const CHAPTER_DATES = {
  1:  'Mar 14 2026 22:11:00 UTC',
  2:  'Mar 15 2026 09:15:00 UTC',
  3:  'Mar 28 2026 14:00:00 UTC',
  4:  'Apr 22 2026 06:30:00 UTC',
  5:  'May 12 2026 18:00:00 UTC',
  6:  'Jun 11 2026 10:00:00 UTC',
  7:  'Jul 22 2032 07:00:00 UTC',
  8:  'Aug 06 2032 14:30:00 UTC',
  9:  'Aug 20 2032 08:00:00 UTC',
  10: 'Sep 09 2032 11:30:00 UTC',
  11: 'Sep 29 2032 06:00:00 UTC',
  12: 'Oct 19 2032 09:00:00 UTC',
  13: 'Nov 08 2032 14:00:00 UTC',
  14: 'Nov 28 2032 07:30:00 UTC',
  15: 'Dec 18 2032 10:00:00 UTC',
  16: 'Jan 07 2033 08:00:00 UTC',
  17: 'Jan 27 2033 11:00:00 UTC',
  18: 'Feb 16 2033 09:30:00 UTC',
  19: 'Mar 08 2033 07:00:00 UTC',
  20: 'Mar 28 2033 13:00:00 UTC',
  21: 'Apr 17 2033 08:00:00 UTC',
  22: 'May 07 2033 10:00:00 UTC',
  23: 'May 27 2033 06:30:00 UTC',
  24: 'Jun 16 2033 09:00:00 UTC',
  25: 'Jul 06 2033 07:00:00 UTC',
  26: 'Jul 26 2033 11:00:00 UTC',
};

function getBaseDate(ch) {
  // find nearest at or below
  for (let k = ch; k >= 1; k--) {
    if (CHAPTER_DATES[k]) return new Date(CHAPTER_DATES[k]);
  }
  return new Date('Jul 22 2032 07:00:00 UTC');
}

let clock = getBaseDate(chapter);

function advance(sec) { clock = new Date(clock.getTime() + sec * 1000); }

function stamp() {
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = clock;
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const mm = String(d.getUTCMinutes()).padStart(2,'0');
  const ss = String(d.getUTCSeconds()).padStart(2,'0');
  return `${mo[d.getUTCMonth()]} ${d.getUTCDate()} ${d.getUTCFullYear()}  ${hh}:${mm}:${ss} UTC`;
}

// ============================================================
//  CAST — each user has a role, voice, and topic focus
// ============================================================
const CAST = {

    role: 'ops',    // official-sounding, terse
  },
  FieldTech87: {
    cls: 'field',
    role: 'field',  // technical, specific, measured
  },
  regolithrat: {
    cls: 'field',
    role: 'field',
  },
  deltaVghost: {
    cls: 'field',
    role: 'field',
  },
  orbitalwatch: {
    cls: 'ops',
    role: 'ops',
  },
  gravel_eater: {
    cls: 'noise',
    role: 'noise',  // loud, suspicious, trailing-off
  },
  oxide_99: {
    cls: 'critic',
    role: 'critic', // lowercase, direct, a bit contemptuous
  },
  junkyardAI: {
    cls: 'noise',
    role: 'noise',
  },
  lateburner: {
    cls: 'critic',
    role: 'critic',
  },
  hotloop: {
    cls: 'anon',
    role: 'anon',   // brief, cryptic, sometimes just one word
  },
  voidmargin: {
    cls: 'anon',
    role: 'anon',
  },
  craterwatch: {
    cls: 'field',
    role: 'field',
  },

// ============================================================
//  TEXT POOLS — organized by chapter era and voice
// ============================================================

// Late chapters (15-26) — endgame, polar approach, final legs
const ERA_LATE = {
  ops: [
    'Helios vehicle confirmed at polar approach corridor. All systems nominal.',

  ],
  anon: [
    'hermite.',

    'shadow transit.',
    'finish.',

function getPool() {
  if (chapter <= 6)  return ERA_EARLY;
  if (chapter <= 14) return ERA_MID;
  return ERA_LATE;
}

// ============================================================
//  POST GENERATION
// ============================================================
const usedTexts = new Set();

function pickFresh(arr) {
  const unused = arr.filter(t => !usedTexts.has(t));
  const pool = unused.length > 0 ? unused : arr; // reset if exhausted
  const pick = pool[Math.floor(Math.random() * pool.length)];
  usedTexts.add(pick);
  return pick;
}

function pickUser(excludeUser) {
  const names = Object.keys(CAST).filter(u => u !== excludeUser);
  return names[Math.floor(Math.random() * names.length)];
}

function applyVoice(text, role) {
  if (role === 'critic')  return text.toLowerCase().replace(/\.$/, '');
  if (role === 'noise')   return text.endsWith('...') ? text : text + (Math.random() < 0.5 ? '...' : '');
  if (role === 'anon')    return text.toLowerCase();
  if (role === 'ops')     return text;
  return text;
}

// noise users have higher chance of replying
const NOISE_USERS  = ['gravel_eater','junkyardAI','oxide_99','lateburner','hotloop','voidmargin'];
const FIELD_USERS  = ['FieldTech87','regolithrat','deltaVghost','craterwatch'];
const OPS_USERS    = ['HeliosOps','orbitalwatch'];

function weightedUser(exclude) {
  // slight bias: noise users post more
  const roll = Math.random();
  let pool;
  if (roll < 0.35)      pool = NOISE_USERS;
  else if (roll < 0.65) pool = FIELD_USERS;
  else                  pool = OPS_USERS;
  const filtered = pool.filter(u => u !== exclude);
  if (!filtered.length) return pickUser(exclude);
  return filtered[Math.floor(Math.random() * filtered.length)];
}

function createPost() {
  const pool = getPool();
  const user = weightedUser(null);
  const role = CAST[user]?.role || 'anon';

  // pick text from matching role pool, fall back to noise
  const textPool = pool[role] || pool.noise;
  const rawText = pickFresh(textPool);
  const text = applyVoice(rawText, role);

  const post = { user, cls: CAST[user]?.cls || 'anon', text, replies: [] };

  // reply probability
  const replyChance = role === 'ops' ? 0.5 : 0.72;
  if (Math.random() < replyChance) {
    const replyUser = weightedUser(user);
    const replyRole = CAST[replyUser]?.role || 'anon';
    const replyPool = pool[replyRole] || pool.noise;
    const replyText = applyVoice(pickFresh(replyPool), replyRole);
    post.replies.push({ user: replyUser, cls: CAST[replyUser]?.cls || 'anon', text: replyText });

    // occasional second reply
    if (Math.random() < 0.35) {
      const ru2 = weightedUser(replyUser);
      const rr2 = CAST[ru2]?.role || 'anon';
      const rp2 = pool[rr2] || pool.noise;
      post.replies.push({ user: ru2, cls: CAST[ru2]?.cls || 'anon', text: applyVoice(pickFresh(rp2), rr2) });
    }
  }

  return post;
}

// ============================================================
//  RENDER
// ============================================================
function render(post) {
  const feed = document.getElementById('feed');
  if (feed.children.length > 40) feed.removeChild(feed.lastChild);

  const div = document.createElement('div');
  div.className = 'post';
  div.innerHTML = `
    <div class="post-header">
      <span class="user ${post.cls}">@${post.user}</span>
      <span class="time">${stamp()}</span>
    </div>
    <div class="post-text">${post.text}</div>
  `;

  feed.prepend(div);

  post.replies.forEach((r, i) => {
    setTimeout(() => {
      advance(15 + Math.floor(Math.random() * 25));
      const rep = document.createElement('div');
      rep.className = 'reply';
      rep.innerHTML = `
        <div class="post-header">
          <span class="user ${r.cls}">@${r.user}</span>
          <span class="time">${stamp()}</span>
        </div>
        <div class="post-text">${r.text}</div>
      `;
      div.appendChild(rep);
    }, 1200 + i * 2200);
  });
}

// ============================================================
//  LOOP
// ============================================================
function start() {
  // seed 4 initial posts with slightly staggered times
  for (let i = 0; i < 4; i++) {
    advance(30 + Math.floor(Math.random() * 40));
    render(createPost());
  }
  // new post every 5-8 seconds
  let interval = 5500;
  function post() {
    advance(45 + Math.floor(Math.random() * 60));
    render(createPost());
    interval = 5000 + Math.random() * 3000;
    setTimeout(post, interval);
  }
  setTimeout(post, interval);
}

start();
</script>
