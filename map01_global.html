<!DOCTYPE html>
<html>
<head>
<title>ATN Surface Operations Cartography</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #000;
  overflow: hidden;
}

#frame {
  border: 1px solid #888;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  font-family: monospace;
}

#header {
  flex-shrink: 0;
  background: #0a0a0a;
  border-bottom: 1px solid #555;
  padding: 7px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#atn-title {
  font-size: 17px;
  font-weight: bold;
  letter-spacing: 3px;
  color: #fff;
}

#atn-subtitle {
  font-size: 9px;
  letter-spacing: 2px;
  color: #aaa;
  margin-top: 2px;
}

#map-id {
  font-size: 12px;
  letter-spacing: 2px;
  color: #ccc;
}

#map {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  position: relative;
  background: #000;
}

.leaflet-control-zoom,
.leaflet-control-attribution,
.leaflet-control-container { display: none !important; }

#north-arrow {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
}

#north-label {
  font-size: 9px;
  color: #fff;
  letter-spacing: 1px;
  font-family: monospace;
}

#footer {
  flex-shrink: 0;
  background: #0a0a0a;
  border-top: 1px solid #555;
  padding: 5px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#footer-left { font-size: 9px; letter-spacing: 1px; color: #aaa; }
#footer-right { font-size: 9px; letter-spacing: 1px; color: #666; }

</style>
</head>
<body>

<div id="frame">
  <div id="header">
    <div>
      <div id="atn-title">AURELIA TRAVERSE NETWORK</div>
      <div id="atn-subtitle">SURFACE OPERATIONS CARTOGRAPHY</div>
    </div>
    <div id="map-id">ATN-GLOBAL-01</div>
  </div>

  <div id="map">
    <div id="north-arrow">
      <svg width="18" height="28" viewBox="0 0 18 28">
        <polygon points="9,2 14,16 9,13 4,16" fill="#fff"/>
        <polygon points="9,26 14,12 9,15 4,12" fill="#444"/>
        <line x1="9" y1="2" x2="9" y2="26" stroke="#fff" stroke-width="0.5"/>
      </svg>
      <div id="north-label">N</div>
    </div>
  </div>

  <div id="footer">
    <div id="footer-left">HELIOS DYNAMICS · FULL TRAVERSE NETWORK</div>
    <div id="footer-right">LUNAR RECONNAISSANCE ORBITER · NASA/GSFC/ASU</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

const W = 8192;
const H = 4096;

const CRS = L.extend({}, L.CRS.Simple, {
  transformation: new L.Transformation(1,0,-1,H)
});

const map = L.map("map", {
  crs: CRS,
  zoomControl: false,
  attributionControl: false,
  minZoom: -8,
  maxZoom: 4,
  preferCanvas: true
});

L.imageOverlay("moon.jpg", [[0,0],[H,W]]).addTo(map);

function geo(lat, lon){
  const x = (lon+180)/360*W;
  const y = (90-lat)/180*H;
  return L.latLng(H-y, x);
}

function fitFill(){
  // Compute zoom that makes image fill the container with no padding
  const container = map.getContainer();
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  // image aspect W:H, container aspect cw:ch
  // fitBounds pads; instead compute zoom directly
  const scaleX = cw / W;
  const scaleY = ch / H;
  const scale = Math.max(scaleX, scaleY); // FILL, not fit
  const z = map.getZoom() + Math.log2(scale * (W / cw));
  // Simpler: just use fitBounds with no padding then nudge
  map.fitBounds([[0,0],[H,W]], {animate:false, padding:[0,0]});
}

function lockMap(){
  const z = map.getZoom();
  map.setMinZoom(z);
  map.setMaxZoom(z);
  map.dragging.disable();
  map.touchZoom.disable();
  map.doubleClickZoom.disable();
  map.scrollWheelZoom.disable();
  map.boxZoom.disable();
  map.keyboard.disable();
}

window.addEventListener("load", ()=>{
  map.invalidateSize({animate:false});

  // Compute fill zoom manually
  const cw = map.getContainer().clientWidth;
  const ch = map.getContainer().clientHeight;

  // Leaflet CRS.Simple: at zoom 0, 1 pixel = 1 map unit
  // We need to find zoom where image fills container
  // image is W x H map units
  // at zoom z: W * 2^z = cw  → z = log2(cw/W)
  // pick the larger of x/y fill zooms
  const zx = Math.log2(cw / W);
  const zy = Math.log2(ch / H);
  const fillZoom = zx;

  // Center of the image in map coords
  const center = L.latLng(H/2, W/2);
  map.setView(center, fillZoom, {animate:false});

  setTimeout(lockMap, 150);
});

// ── GRATICULE 30° ──
const GRAT = { color:"#ffffff", weight:0.8, opacity:0.4, interactive:false };

for(let lat = -60; lat <= 60; lat += 30){
  if(lat === 0) continue;
  let pts = [];
  for(let lon = -180; lon <= 180; lon += 2) pts.push(geo(lat, lon));
  L.polyline(pts, GRAT).addTo(map);
}
for(let lon = -180; lon <= 180; lon += 30){
  let pts = [];
  for(let lat = -89; lat <= 89; lat += 2) pts.push(geo(lat, lon));
  L.polyline(pts, GRAT).addTo(map);
}

// ── EQUATOR ──
let eq = [];
for(let lon = -180; lon <= 180; lon += 2) eq.push(geo(0, lon));
L.polyline(eq, { color:"#00ffff", weight:2, opacity:0.7, interactive:false }).addTo(map);

// ── ROUTES ──
const routes = [
  "rout3leg01.kml","rout3leg02.kml","rout3leg03.kml",
  "rout3leg04.kml","rout3leg05.kml","rout3leg06.kml",
  "rout3leg07.kml","rout3leg08.kml","rout3leg09.kml",
  "rout3leg10.kml","rout3leg11.kml"
];

routes.forEach(file=>{
  fetch("data/"+file)
  .then(r=>r.text())
  .then(text=>{
    const xml = new DOMParser().parseFromString(text,"text/xml");
    xml.querySelectorAll("coordinates").forEach(node=>{
      let lastLon = null, segment = [], segments = [];
      node.textContent.trim().split(/\s+/).forEach(p=>{
        let [lon,lat] = p.split(",");
        lon = parseFloat(lon); lat = parseFloat(lat);
        if(isNaN(lat)||isNaN(lon)) return;
        if(lastLon !== null && Math.abs(lon-lastLon) > 180){
          if(segment.length > 1) segments.push(segment);
          segment = [];
        }
        lastLon = lon;
        segment.push(geo(lat,lon));
      });
      if(segment.length > 1) segments.push(segment);
      segments.forEach(s=>{
        L.polyline(s,{color:"#ff4444",weight:2,interactive:false}).addTo(map);
      });
    });
  });
});

</script>
</body>
</html>
